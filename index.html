<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lavender Expense Tracker</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Custom Styles -->
  <link rel="stylesheet" href="css/style.css">

  <!-- Import Maps for React, Firebase, and Icons -->
  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "firebase/app": "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js",
        "lucide-react": "https://esm.sh/lucide-react@0.344.0"
      }
    }
  </script>

  <!-- SheetJS for Excel Export -->
  <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.min.js"></script>
  <!-- Babel for parsing JSX in the browser -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>

<body class="bg-slate-50">

  <!-- React will mount here -->
  <div id="root"></div>

  <!-- Config: Firebase keys, Gemini key, categories, AI engine, utilities -->
  <!-- This is a REGULAR script (not module), so it works on file:// -->
  <script src="js/config.js"></script>

  <!-- Main Application Code (JSX must stay inline for Babel on file://) -->
  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, useMemo, useRef } from 'react';
    import { createRoot } from 'react-dom/client';
    import { initializeApp, getApps, getApp } from 'firebase/app';
    import { getFirestore, collection, doc, setDoc, onSnapshot, addDoc, deleteDoc, serverTimestamp, updateDoc, writeBatch, initializeFirestore, persistentLocalCache, persistentMultipleTabManager } from 'firebase/firestore';
    import { getAuth, onAuthStateChanged, signInAnonymously, setPersistence, browserLocalPersistence, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, updatePassword } from 'firebase/auth';
    import { Wallet, Plus, TrendingUp, GraduationCap, Users, Loader2, Trash2, X, Landmark, PiggyBank, Target, Activity, Sparkles, Coins, CalendarCheck, UploadCloud, Wifi, WifiOff, Database, User as UserIcon, Edit3, FileCode, LayoutDashboard, History, LayoutList, ShoppingCart, Car, Coffee, Smartphone as PhoneIcon, ChevronRight, CheckCircle2, Banknote, BrainCircuit, AlertTriangle, RefreshCw, FileText, Search } from 'lucide-react';

    // ==========================================
    // CONFIG & UTILITIES — loaded from js/config.js
    // ==========================================
    const firebaseConfig = window.LAVENDER_FIREBASE_CONFIG;
    const appId = window.LAVENDER_APP_ID;
    const apiKey = window.LAVENDER_GEMINI_KEY;
    const callGemini = window.callGemini;
    const CATEGORIES = window.LAVENDER_CATEGORIES;
    const parseDate = window.lavenderParseDate;
    const getLocalYMD = window.lavenderGetLocalYMD;
    const getMonthKey = window.lavenderGetMonthKey;
    const isIncome = window.lavenderIsIncome;

    const ICON_MAP = { Coffee, ShoppingCart, Car, GraduationCap, Landmark, Users, PiggyBank, PhoneIcon, Plus, Banknote };

    let auth, db;
    if (firebaseConfig.apiKey) {
      const app = getApps().length > 0 ? getApp() : initializeApp(firebaseConfig);
      auth = getAuth(app);
      try {
        db = initializeFirestore(app, { localCache: persistentLocalCache({ tabManager: persistentMultipleTabManager() }) });
      } catch (e) {
        db = getFirestore(app);
      }
    }

    function useExchangeRate() {
      const [rates, setRates] = useState({ INR: 22.25, USD: 0.27, AED: 0.98, PKR: 75, BDT: 30, QAR: 0.97, EUR: 0.25, GBP: 0.21, KWD: 0.08 });
      useEffect(() => {
        const fetchRates = () => window.fetchAllRates().then(setRates).catch(() => {});
        fetchRates();
        const interval = setInterval(fetchRates, 30 * 60 * 1000);
        return () => clearInterval(interval);
      }, []);
      return rates;
    }

    function useStats(transactions, commitments, debts, settings, rates) {
      return useMemo(() => {
        const currentMonthKey = getMonthKey();
        const todayStr = new Date().toDateString();
        const lastDay = new Date(new Date().getFullYear(), new Date().getMonth() + 1, 0).getDate();
        
        const toSAR = (amount, currency) => {
          const num = window.lavenderSafeFloat(amount);
          if (!currency || currency === 'SAR') return num;
          const rate = rates[currency];
          return rate ? num / rate : num / 22.25; // fallback
        };

        const fromSAR = (amountSAR, currency) => {
          const num = window.lavenderSafeFloat(amountSAR);
          if (!currency || currency === 'SAR') return num;
          const rate = rates[currency];
          return rate ? num * rate : num * 22.25;
        };

        let incSAR = 0, expSAR = 0, todaySpendSAR = 0;
        const categoryTotals = {};

        transactions.forEach(t => {
          if (t.monthKey !== currentMonthKey) return;
          const valSAR = toSAR(t.amount, t.currency);

          if (isIncome(t)) {
            incSAR += valSAR;
          } else {
            expSAR += valSAR;
            if (parseDate(t.date).toDateString() === todayStr) todaySpendSAR += valSAR;
            categoryTotals[t.category] = (categoryTotals[t.category] || 0) + valSAR;
          }
        });

        const safeSalary = window.lavenderSafeFloat(settings.salary);
        const baseIncome = safeSalary > 0 ? toSAR(safeSalary, settings.salaryCurrency || 'SAR') : incSAR;
        const savingsPercent = window.lavenderSafeFloat(settings.savingsPercent) || 30;
        const lockedSavings = baseIncome * (savingsPercent / 100);

        let unpaidCommitmentsSAR = 0;
        const todayDate = new Date().getDate();
        const lastDayOfMonth = lastDay;
        const commitmentList = commitments.map(c => {
          const amtSAR = toSAR(c.amount, c.currency);
          const paidAmtSAR = transactions
            .filter(t => t.commitmentId === c.id && t.monthKey === currentMonthKey)
            .reduce((sum, t) => sum + toSAR(t.amount, t.currency), 0);

          const remaining = Math.max(0, amtSAR - paidAmtSAR);
          unpaidCommitmentsSAR += remaining;
          
          const dueDay = c.dueDate || 1;
          const daysUntilDue = dueDay >= todayDate ? dueDay - todayDate : (lastDayOfMonth - todayDate) + dueDay;
          const isOverdue = paidAmtSAR < (amtSAR * 0.99) && dueDay < todayDate;

          return { ...c, isPaid: paidAmtSAR >= (amtSAR * 0.99), remainingSAR: remaining, daysUntilDue, isOverdue };
        });

        const fixedOutgoingsSAR = commitments.reduce((sum, c) => sum + toSAR(c.amount, c.currency), 0);
        const monthlySpendingPool = Math.max(0, baseIncome - (lockedSavings + fixedOutgoingsSAR));
        const dailyAllowance = monthlySpendingPool / lastDay;
        const leftForToday = dailyAllowance - todaySpendSAR;

        let totalWealthSAR = 0;
        let totalCreditUsedSAR = 0;
        let totalCreditLimitSAR = 0;

        const realtimeDebts = debts.map(account => {
          let balance = toSAR(account.amount, account.currency);
          transactions.forEach(t => {
            if (t.accountId === account.id) {
              const valSAR = toSAR(t.amount, t.currency);
              if (account.type === 'debt' || account.type === 'credit_card') {
                balance += isIncome(t) ? -valSAR : valSAR;
              } else {
                balance += isIncome(t) ? valSAR : -valSAR;
              }
            }
          });
          totalWealthSAR += ((account.type === 'debt' || account.type === 'credit_card') ? -balance : balance);
          
          let cardDetails = {};
          if (account.type === 'credit_card') {
             const limit = toSAR(account.creditLimit || 0, account.currency);
             totalCreditUsedSAR += balance;
             totalCreditLimitSAR += limit;
             
             const dueDay = account.paymentDueDate || 1;
             const daysUntilDue = dueDay >= todayDate ? dueDay - todayDate : (lastDayOfMonth - todayDate) + dueDay;
             
             cardDetails = {
               availableCreditSAR: Math.max(0, limit - balance),
               usagePercent: limit > 0 ? (balance / limit) * 100 : 0,
               minimumPaymentSAR: balance * ((account.minimumPaymentPercent || 5) / 100),
               daysUntilDue
             };
          }

          return { 
            ...account, 
            ...cardDetails,
            realtimeBalanceSAR: balance,
            realtimeBalanceOriginal: fromSAR(balance, account.currency)
          };
        });

        return {
          leftForToday, dailyAllowance, todaySpendSAR,
          incSAR: baseIncome, expSAR, lockedSavings,
          unpaidCommitmentsSAR, commitmentList, realtimeDebts, categoryTotals,
          totalWealthSAR, totalCreditUsedSAR, totalCreditLimitSAR,
          creditCards: realtimeDebts.filter(d => d.type === 'credit_card'),
          health: leftForToday < 0 ? "red" : leftForToday < (dailyAllowance * 0.2) ? "yellow" : "green"
        };
      }, [transactions, commitments, debts, settings, rates]);
    }

    function LoginScreen() {
      const [email, setEmail] = useState('');
      const [pwd, setPwd] = useState('');
      const [isReg, setIsReg] = useState(false);
      const [err, setErr] = useState('');
      const [isLoading, setIsLoading] = useState(false);
      
      const handleAuth = async (e) => {
        e.preventDefault();
        setErr('');
        setIsLoading(true);
        try {
          if (isReg) {
            await createUserWithEmailAndPassword(auth, email, pwd);
          } else {
            await signInWithEmailAndPassword(auth, email, pwd);
          }
        } catch (error) {
          setErr(error.message);
        } finally {
          setIsLoading(false);
        }
      };

      return (
        <div className="min-h-screen flex items-center justify-center p-6 bg-slate-900 absolute inset-0 z-[1000]">
          <form onSubmit={handleAuth} className="w-full max-w-sm bg-slate-800 p-8 rounded-[2.5rem] shadow-2xl space-y-6">
            <div className="text-center mb-8">
              <div className="w-20 h-20 bg-emerald-500/20 text-emerald-400 rounded-full flex items-center justify-center mx-auto mb-4 border border-emerald-500/30 shadow-[0_0_30px_rgba(16,185,129,0.2)]">
                <Users size={32} />
              </div>
              <h2 className="text-2xl font-black text-white">{isReg ? 'Device Registration' : 'Account Link Login'}</h2>
              <p className="text-[10px] font-black text-emerald-400 uppercase tracking-widest mt-2">Global Secure Sync</p>
            </div>
            {err && <div className="text-[10px] font-black uppercase text-rose-400 bg-rose-500/10 p-4 rounded-xl border border-rose-500/30">{err}</div>}
            <div className="space-y-4">
              <input type="email" value={email} onChange={e => setEmail(e.target.value)} placeholder="Email Address" className="w-full bg-slate-900/50 text-white p-5 rounded-2xl border border-slate-700 font-bold outline-none focus:border-emerald-500 transition-colors" required />
              <input type="password" value={pwd} onChange={e => setPwd(e.target.value)} placeholder="Password (6+ chars)" className="w-full bg-slate-900/50 text-white p-5 rounded-2xl border border-slate-700 font-bold outline-none focus:border-emerald-500 transition-colors" required />
              <button type="submit" disabled={isLoading} className="w-full bg-emerald-500 hover:bg-emerald-400 text-slate-900 p-5 rounded-2xl font-black uppercase text-xs tracking-widest transition-colors shadow-[0_0_20px_rgba(16,185,129,0.3)]">
                {isLoading ? 'Connecting...' : (isReg ? 'Create Account & Sync' : 'Login & Sync')}
              </button>
            </div>
            <p className="text-center text-[10px] font-bold text-slate-400 mt-6 cursor-pointer uppercase tracking-wider hover:text-white transition-colors" onClick={() => setIsReg(!isReg)}>
              {isReg ? 'Already Registered? Tap to Login' : 'Need to link this device? Register'}
            </p>
          </form>
        </div>
      );
    }

    function App() {
      const [user, setUser] = useState(null);
      const [appPin, setAppPin] = useState(localStorage.getItem('lavender_pin') || '');
      const [isUnlocked, setIsUnlocked] = useState(!localStorage.getItem('lavender_pin'));
      const [pinInput, setPinInput] = useState('');
      
      const [isOnline, setIsOnline] = useState(navigator.onLine);

      const [transactions, setTransactions] = useState([]);
      const [debts, setDebts] = useState([]);
      const [commitments, setCommitments] = useState([]);
      const [settings, setSettings] = useState({ salary: '', savingsPercent: 30 });

      const rates = useExchangeRate();
      const stats = useStats(transactions, commitments, debts, settings, rates);

      const [primaryCurrency, setPrimaryCurrency] = useState('SAR');
      const [secondaryCurrency, setSecondaryCurrency] = useState('INR');
      
      const [loading, setLoading] = useState(true);
      const [isProcessing, setIsProcessing] = useState(false);
      const [activeTab, setActiveTab] = useState('dashboard');

      const [showAddModal, setShowAddModal] = useState(false);
      const [editingItem, setEditingItem] = useState(null);
      const [editingCommitment, setEditingCommitment] = useState(null);
      const [editingDebt, setEditingDebt] = useState(null);
      const [showSmartSync, setShowSmartSync] = useState(false);
      const [showCommitmentModal, setShowCommitmentModal] = useState(false);
      const [showDebtModal, setShowDebtModal] = useState(false);
      const [debtModalType, setDebtModalType] = useState('asset');
      const [confirmDelete, setConfirmDelete] = useState(null);
      const [syncResults, setSyncResults] = useState([]);

      const [magicSms, setMagicSms] = useState("");
      const [isMagicLoading, setIsMagicLoading] = useState(false);

      const [toast, setToast] = useState(null);
      const toastTimer = useRef(null);

      useEffect(() => {
        return () => {
          if (toastTimer.current) clearTimeout(toastTimer.current);
        };
      }, []);

      const formatMoney = (amountSAR, overrideCurrency = null) => {
        const curCode = overrideCurrency || primaryCurrency;
        const num = window.lavenderSafeFloat(amountSAR);

        let displayValue;
        let symbol;

        if (curCode === 'SAR') {
          symbol = 'SR';
          displayValue = num;
        } else {
          const rate = rates[curCode] || 1;
          displayValue = num * rate;
          symbol = (window.LAVENDER_CURRENCIES?.find(c => c.code === curCode)?.symbol) || curCode;
        }

        const sign = displayValue < 0 ? '-' : '';
        const absFormatted = Math.abs(displayValue).toLocaleString(undefined, { maximumFractionDigits: 0 });
        return `${sign}${symbol} ${absFormatted}`;
      };

      const exportToExcel = () => {
        if (transactions.length === 0) { showToast("No transactions to export", "error"); return; }
        const data = transactions.map(t => ({
          Date: getLocalYMD(parseDate(t.date)),
          Merchant: t.merchant,
          Amount: t.amount,
          Currency: t.currency,
          Category: t.category,
          Type: t.type
        }));
        const ws = XLSX.utils.json_to_sheet(data);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Transactions");
        XLSX.writeFile(wb, `Lavender_Expenses_${new Date().getFullYear()}.xlsx`);
        showToast("Excel Exported!");
      };

      const showToast = (message, type = 'success', duration = 4000) => {
        setToast({ message, type });
        if (toastTimer.current) clearTimeout(toastTimer.current);
        toastTimer.current = setTimeout(() => setToast(null), duration);
      };

      useEffect(() => {
        const handleOnline = () => setIsOnline(true);
        const handleOffline = () => setIsOnline(false);
        window.addEventListener('online', handleOnline);
        window.addEventListener('offline', handleOffline);
        return () => {
          window.removeEventListener('online', handleOnline);
          window.removeEventListener('offline', handleOffline);
        };
      }, []);

      useEffect(() => {
        if (!firebaseConfig.apiKey) {
          setLoading(false);
          showToast("Firebase Config Missing. Check the code.", "error");
          return;
        }
        const initAuth = async () => {
          try {
            await setPersistence(auth, browserLocalPersistence);
          } catch (err) { console.error("Auth init warning:", err); }
        };
        initAuth();
        return onAuthStateChanged(auth, (u) => { 
          if (u && !u.isAnonymous) {
            setUser(u);
          } else {
            setUser(null);
          }
          setLoading(false); 
        });
      }, []);

      useEffect(() => {
        const timeout = setTimeout(() => {
          if (loading) {
            setLoading(false);
            showToast("Connection timeout. App loaded in offline mode.", "error", 6000);
          }
        }, 15000);
        return () => clearTimeout(timeout);
      }, [loading]);

      useEffect(() => {
        if (!user || !db) return;
        const path = (col) => collection(db, 'artifacts', appId, 'users', user.uid, col);
        const unsubTrans = onSnapshot(path('transactions'), (s) => setTransactions(s.docs.map(d => ({ id: d.id, ...d.data() })).sort((a, b) => parseDate(b.date) - parseDate(a.date))));
        const unsubDebts = onSnapshot(path('debts'), (s) => setDebts(s.docs.map(d => ({ id: d.id, ...d.data() }))));
        const unsubCommit = onSnapshot(path('commitments'), (s) => setCommitments(s.docs.map(d => ({ id: d.id, ...d.data() }))));
        const unsubSettings = onSnapshot(doc(db, 'artifacts', appId, 'users', user.uid, 'settings', 'config'), (d) => {
          if (d.exists()) {
            const data = d.data();
            setSettings(data);
            if (data.primaryCurrency) setPrimaryCurrency(data.primaryCurrency);
            if (data.secondaryCurrency) setSecondaryCurrency(data.secondaryCurrency);
          }
        });
        return () => { unsubTrans(); unsubDebts(); unsubCommit(); unsubSettings(); };
      }, [user]);

      const executeDelete = async () => {
        if (!confirmDelete || !user || !db) return;
        try {
          await deleteDoc(doc(db, 'artifacts', appId, 'users', user.uid, confirmDelete.col, confirmDelete.id));
          showToast(`${confirmDelete.title} Deleted`);
        } catch (err) {
          showToast("Delete failed (Offline or Error)", "error");
        }
        setConfirmDelete(null);
      };

      const saveTransaction = async (e) => {
        e.preventDefault();
        if (!user || !db) return;
        const formData = new FormData(e.target);

        const rawAmount = parseFloat(formData.get('amount'));
        if (!rawAmount || rawAmount <= 0) {
          showToast("Enter a valid positive amount", "error");
          return;
        }

        const merchantRaw = formData.get('merchant')?.trim();
        const merchant = merchantRaw || "Unknown";
        const selectedCurrency = formData.get('currency');

        const data = {
          amount: rawAmount,
          currency: selectedCurrency,
          baseAmountSAR: selectedCurrency === 'SAR' ? rawAmount : rawAmount / (rates[selectedCurrency] || 1),
          merchant,
          category: formData.get('category'),
          type: formData.get('type'),
          accountId: formData.get('accountId') || null,
          commitmentId: formData.get('commitmentId') || null,
          date: (() => {
            const rawDate = formData.get('date');
            const [y, m, d] = rawDate.split('-').map(Number);
            return new Date(y, m - 1, d);
          })(),
          monthKey: (() => {
            const rawDate = formData.get('date');
            const [y, m, d] = rawDate.split('-').map(Number);
            return getMonthKey(new Date(y, m - 1, d));
          })(),
          updatedAt: serverTimestamp()
        };

        if (editingItem) {
          updateDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'transactions', editingItem.id), data).catch(err => showToast("Firebase Error: " + err.message, "error", 10000));
          showToast("Transaction Updated!");
        } else {
          addDoc(collection(db, 'artifacts', appId, 'users', user.uid, 'transactions'), { ...data, createdAt: serverTimestamp() }).catch(err => showToast("Firebase Error: " + err.message, "error", 10000));
          showToast("Transaction Added!");
        }
        setShowAddModal(false);
        setEditingItem(null);
      };

      const handleAiAction = async (inputText = null, imageBase64 = null) => {
        if (!apiKey) { showToast("Gemini API key not configured", "error"); return; }
        const input = inputText || magicSms;
        if (!input && !imageBase64) return;
        
        setIsMagicLoading(true);
        try {
          const sysPrompt = `You are Lavender's Finance Agent. Convert user instructions or bank text into STRICT JSON. Support:
          - upsert_credit_card: create/update card + optional bill.
          - upsert_bill: create/update fixed bill.
          - add_transaction: single expense/income.
          - bulk_transactions: list of transactions.
          RULES: Dates YYYY-MM-DD. Category MUST map to: ${CATEGORIES.map(c => c.name).join(', ')}. Return ONLY strict JSON.`;

          const text = await callGemini(apiKey, sysPrompt + "\nInput: " + input, true, imageBase64);
          const data = JSON.parse(text.replace(/```json/gi, '').replace(/```/g, '').trim());

          if (data.action === 'upsert_credit_card') {
            const cardData = { ...data.card, createdAt: serverTimestamp() };
            const docRef = await addDoc(collection(db, 'artifacts', appId, 'users', user.uid, 'debts'), cardData);
            if (data.bill) {
              await addDoc(collection(db, 'artifacts', appId, 'users', user.uid, 'commitments'), { ...data.bill, linkedAccountId: docRef.id, createdAt: serverTimestamp() });
            }
            showToast("Credit Card & Bill Created!");
          } else if (data.action === 'upsert_bill') {
            await addDoc(collection(db, 'artifacts', appId, 'users', user.uid, 'commitments'), { ...data.bill, createdAt: serverTimestamp() });
            showToast("Bill Created!");
          } else if (data.action === 'add_transaction') {
            const t = data.transaction;
            const amt = parseFloat(t.amount);
            const tData = {
               ...t, amount: amt, 
               baseAmountSAR: t.currency === 'SAR' ? amt : amt / (rates[t.currency] || 1),
               monthKey: getMonthKey(parseDate(t.date)),
               date: parseDate(t.date), createdAt: serverTimestamp()
            };
            await addDoc(collection(db, 'artifacts', appId, 'users', user.uid, 'transactions'), tData);
            showToast("Transaction Recorded!");
          } else if (data.action === 'bulk_transactions') {
            setSyncResults(data.items);
            setShowSmartSync(true);
            showToast(`Parsed ${data.items.length} items. Review and import.`);
          }
          setMagicSms("");
        } catch (e) {
          showToast("AI Error: " + e.message, "error", 6000);
        } finally {
          setIsMagicLoading(false);
        }
      };

      const processSmartSync = async (inputData = null, isImage = false) => {
        if (!isOnline) { showToast("Requires Internet", "error"); return; }
        if (!apiKey) {
          showToast("Gemini API key not configured", "error");
          return;
        }
        setIsProcessing(true);

        const fullPrompt = `You are a precise financial data extraction engine. Process EVERY SINGLE ROW from the provided bank statement. 
        Return ONLY a strict JSON array. Format: [{"amount": 1500.50, "currency": "INR", "merchant": "Merchant", "type": "expense", "category": "Miscellaneous", "date": "2026-03-27"}]
        RULES:
        1. If "Debit" or "Withdrawal", type is "expense". If "Credit" or "Deposit", type is "income".
        2. NEVER output "amount": 0. Skip blank rows.
        3. Map Category strictly to: ${CATEGORIES.map(c => c.name).join(', ')}.
        DATE: "YYYY-MM-DD". CURRENCY: "INR".
        
        Data to process:
        ${isImage ? "Analyze the attached image." : inputData}`;

        try {
          const text = await callGemini(apiKey, fullPrompt, true, isImage ? inputData : null);
          const extracted = JSON.parse(text.replace(/```json/gi, '').replace(/```/g, '').trim());
          if (!Array.isArray(extracted)) throw new Error("AI returned invalid format");

          const validExtractions = extracted.filter(item => parseFloat(item.amount) > 0 && item.merchant);
          setSyncResults(validExtractions);
          showToast(`AI extracted ${validExtractions.length} items successfully.`);
        } catch (err) {
          showToast("AI Error: " + err.message, "error", 6000);
        } finally { setIsProcessing(false); }
      };

      const confirmSync = async () => {
        if (!user || syncResults.length === 0) return;
        setIsProcessing(true);
        try {
          let batch = writeBatch(db);
          const transCol = collection(db, 'artifacts', appId, 'users', user.uid, 'transactions');
          let count = 0;

          for (const item of syncResults) {
            const parsedDate = (() => {
              if (!item.date) return new Date();
              const [y, m, d] = item.date.split('-').map(Number);
              return (y && m && d) ? new Date(y, m - 1, d) : new Date(item.date);
            })();
            const finalAmount = parseFloat(item.amount) || 0;

            batch.set(doc(transCol), {
              ...item,
              amount: finalAmount,
              baseAmountSAR: item.currency === 'SAR' ? finalAmount : finalAmount / (rates[item.currency] || 1),
              date: isNaN(parsedDate.getTime()) ? new Date() : parsedDate,
              monthKey: getMonthKey(parsedDate),
              createdAt: serverTimestamp()
            });

            count++;
            if (count % 450 === 0) {
              await batch.commit();
              batch = writeBatch(db);
            }

              <div>
                <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Spent Today</p>
                <p className="text-2xl font-black text-slate-800">{formatMoney(stats.todaySpendSAR)}</p>
              </div>
            </div>
          </div>

          {/* FEATURE 4: Monthly Overview */}
          <div className="bg-white p-8 rounded-[2.5rem] border border-slate-200 shadow-sm space-y-6">
            <h3 className="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em]">Monthly Overview</h3>
            <div className="grid grid-cols-2 gap-4">
              <div className="bg-emerald-50 p-5 rounded-[2rem] border border-emerald-100">
                <p className="text-[8px] font-black text-emerald-600 uppercase tracking-widest">Total Income</p>
                <p className="text-xl font-black text-emerald-700 mt-1">{formatMoney(stats.incSAR)}</p>
              </div>
              <div className="bg-rose-50 p-5 rounded-[2rem] border border-rose-100">
                <p className="text-[8px] font-black text-rose-600 uppercase tracking-widest">Expenses</p>
                <p className="text-xl font-black text-rose-700 mt-1">{formatMoney(stats.expSAR)}</p>
              </div>
              <div className="bg-indigo-50 p-5 rounded-[2rem] border border-indigo-100">
                <p className="text-[8px] font-black text-indigo-600 uppercase tracking-widest">Bills Left</p>
                <p className="text-xl font-black text-indigo-700 mt-1">{formatMoney(stats.unpaidCommitmentsSAR)}</p>
              </div>
              <div className="bg-purple-50 p-5 rounded-[2rem] border border-purple-100">
                <p className="text-[8px] font-black text-purple-600 uppercase tracking-widest">Target Save</p>
                <p className="text-xl font-black text-purple-700 mt-1">{formatMoney(stats.lockedSavings)}</p>
              </div>
            </div>
          </div>

          {/* FEATURE 5: Category Spending Breakdown */}
          <div className="bg-white p-8 rounded-[2.5rem] border border-slate-200 shadow-sm">
            <h3 className="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] mb-6">Spending Breakdown</h3>
            <div className="space-y-5">
              {Object.entries(stats.categoryTotals)
                .sort(([,a], [,b]) => b - a)
                .slice(0, 6)
                .map(([category, amountSAR]) => {
                  const percentage = stats.expSAR > 0 ? (amountSAR / stats.expSAR) * 100 : 0;
                  return (
                    <div key={category} className="space-y-2">
                      <div className="flex justify-between items-center">
                        <span className="text-xs font-bold text-slate-700 truncate w-40">{category}</span>
                        <span className="text-xs font-black text-slate-900">{formatMoney(amountSAR)}</span>
                      </div>
                      <div className="w-full bg-slate-100 rounded-full h-2 overflow-hidden shadow-inner">
                        <div className="h-2 rounded-full bg-indigo-500 transition-all duration-1000" style={{ width: `${percentage}%` }}></div>
                      </div>
                    </div>
                  );
                })}
              {Object.keys(stats.categoryTotals).length === 0 && (
                <div className="py-8 text-center bg-slate-50 rounded-2xl border border-dashed border-slate-200">
                   <p className="text-xs text-slate-400 font-bold uppercase tracking-widest">No Data This Month</p>
                </div>
              )}
            </div>
          </div>

          <div className="bg-gradient-to-br from-purple-900 to-indigo-900 rounded-[2.5rem] p-6 text-white shadow-xl relative overflow-hidden">
            <div className="flex justify-between items-center mb-4 relative z-10">
              <h3 className="font-black text-lg flex items-center gap-2"><Sparkles className="text-purple-300" /> ✨ AI Advisor</h3>
              {!aiInsight && !isGenerating && (
                <button onClick={generateAiInsight} className="bg-white/20 hover:bg-white/30 px-4 py-2 rounded-xl text-xs font-bold transition-all backdrop-blur-sm">Analyze Month</button>
              )}
            </div>
            <div className="relative z-10">
              {isGenerating ? (
                <div className="flex items-center gap-3 text-purple-200 text-sm font-medium animate-pulse-soft">
                  <Loader2 className="animate-spin" size={16} /> Analyzing your spending habits...
                </div>
              ) : aiInsight ? (
                <div className="space-y-2 text-sm text-purple-50 font-medium leading-relaxed whitespace-pre-line">
                  {aiInsight}
                </div>
              ) : (
                <p className="text-xs text-purple-200">Tap analyze to get personalized insights on your spending, habits, and savings goals powered by Gemini AI.</p>
              )}
            </div>
          </div>

          <div className="flex justify-center pb-8 pt-4">
            <button onClick={exportToExcel} className="flex items-center gap-2 bg-slate-900 text-white px-8 py-4 rounded-3xl font-black uppercase text-xs tracking-widest hover:scale-105 active:scale-95 transition-all shadow-xl">
               <Database size={16} /> Export to Excel
            </button>
          </div>
        </div>
      );
    }

    function LogsTab({ transactions, formatMoney, setEditingItem, setShowAddModal, setConfirmDelete }) {
      const [searchTerm, setSearchTerm] = useState("");
      const [viewMonth, setViewMonth] = useState(getMonthKey());

      const navigateMonth = (direction) => {
        const [year, month] = viewMonth.split('-').map(Number);
        const d = new Date(year, month - 1 + direction, 1);
        setViewMonth(getMonthKey(d));
      };

      const filteredLogs = transactions
        .filter(t => t.monthKey === viewMonth)
        .filter(t => searchTerm === "" || (t.merchant || '').toLowerCase().includes(searchTerm.toLowerCase()) || (t.category || '').toLowerCase().includes(searchTerm.toLowerCase()));

      return (
        <div className="space-y-4 pb-20 animate-in fade-in slide-in-from-bottom-4">
          <h2 className="text-xl font-black px-1 flex justify-between items-center">
            Transactions
          </h2>
          <div className="flex items-center justify-between bg-white p-3 rounded-2xl border border-slate-200 shadow-sm">
            <button onClick={() => navigateMonth(-1)} className="p-2 bg-slate-100 rounded-xl font-black text-sm hover:bg-slate-200 transition-colors">&larr;</button>
            <span className="text-sm font-black text-indigo-600 bg-indigo-50 px-4 py-2 rounded-xl">{viewMonth}</span>
            <button onClick={() => navigateMonth(1)} className="p-2 bg-slate-100 rounded-xl font-black text-sm hover:bg-slate-200 transition-colors">&rarr;</button>
          </div>
          <div className="relative">
            <Search className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400" size={18} />
            <input
              type="text" placeholder="Search logs..." value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)}
              className="w-full bg-white p-4 pl-12 rounded-2xl border border-slate-200 outline-none font-bold text-sm shadow-sm focus:border-indigo-400 focus:ring-4 ring-indigo-50 transition-all"
            />
          </div>
          <div className="space-y-3">
            {filteredLogs.map(t => {
              const CatIcon = CATEGORIES.find(c => c.name === t.category)?.icon || Plus;
              const RenderIcon = ICON_MAP[CatIcon] || Coins;
              return (
                <div key={t.id} className="bg-white p-5 rounded-[2rem] flex flex-col gap-4 border border-slate-200 shadow-sm">
                  <div className="flex items-center justify-between">
                    <div className="flex items-center gap-4">
                      <div className={`w-12 h-12 rounded-2xl flex items-center justify-center shadow-sm ${isIncome(t) ? 'bg-emerald-50 text-emerald-600' : 'bg-slate-50 text-slate-600'}`}><RenderIcon size={20} /></div>
                      <div className="overflow-hidden">
                        <p className="font-bold text-base text-slate-800 leading-tight truncate w-40">{t.merchant}</p>
                        <p className="text-[10px] text-slate-400 font-bold uppercase tracking-widest mt-1">{t.category}</p>
                        <p className="text-[9px] text-slate-300 font-medium mt-0.5">
                          {parseDate(t.date).toLocaleDateString(undefined, { day: 'numeric', month: 'short', year: 'numeric' })}
                        </p>
                      </div>
                    </div>
                    <div className="text-right">
                      <p className={`font-black text-lg ${isIncome(t) ? 'text-emerald-600' : 'text-slate-900'}`}>{isIncome(t) ? '+' : '-'}{t.amount}</p>
                      <p className="text-[10px] text-slate-400 font-bold uppercase">{t.currency}</p>
                    </div>
                  </div>
                  <div className="flex justify-end gap-2 pt-3 border-t border-slate-100">
                    <button onClick={() => { setEditingItem(t); setShowAddModal(true); }} className="flex items-center gap-1.5 px-4 py-2 bg-indigo-50 text-indigo-600 rounded-xl font-bold text-[10px] uppercase tracking-widest hover:bg-indigo-100 transition-colors"><Edit3 size={14} /> Edit</button>
                    <button onClick={() => setConfirmDelete({ col: 'transactions', id: t.id, title: 'Transaction' })} className="flex items-center gap-1.5 px-4 py-2 bg-rose-50 text-rose-600 rounded-xl font-bold text-[10px] uppercase tracking-widest hover:bg-rose-100 transition-colors"><Trash2 size={14} /> Delete</button>
                  </div>
                </div>
              );
            })}
            {filteredLogs.length === 0 && (
              <div className="text-center py-20 bg-white rounded-[2rem] border border-slate-200">
                <FileText className="mx-auto text-slate-200 mb-4" size={48} />
                <p className="text-lg font-black text-slate-300">No Transactions</p>
                <p className="text-xs text-slate-400 font-medium mt-1 px-8 leading-relaxed">Your spending history will appear here once you start logging transactions.</p>
                <button onClick={() => setShowAddModal(true)} className="mt-8 bg-slate-900 text-white px-6 py-3 rounded-xl text-xs font-black uppercase tracking-widest">
                   + Add First Record
                </button>
              </div>
            )}
          </div>
        </div>
      );
    }

    function BillsTab({ stats, formatMoney, setConfirmDelete, setShowCommitmentModal }) {
      return (
        <div className="space-y-6 pb-20 animate-in fade-in slide-in-from-bottom-4">
          <div className="flex justify-between items-center px-1">
            <h2 className="text-xl font-black">Fixed Bills</h2>
            <button onClick={() => setShowCommitmentModal(true)} className="px-4 py-2 bg-slate-900 text-white rounded-xl text-xs font-black uppercase tracking-widest shadow-lg flex items-center gap-2"><Plus size={16} /> Add Bill</button>
          </div>
          <div className="bg-indigo-600 rounded-[2.5rem] p-8 text-white shadow-xl shadow-indigo-100 relative overflow-hidden">
            <div className="absolute top-0 right-0 w-32 h-32 bg-white/10 rounded-full -mr-10 -mt-10 blur-2xl"></div>
            <p className="text-[10px] font-bold text-indigo-200 uppercase tracking-widest relative z-10">Unpaid Total</p>
            <h3 className="text-4xl font-black mt-1 relative z-10">{formatMoney(stats.unpaidCommitmentsSAR)}</h3>
          </div>
          <div className="space-y-3">
            {stats.commitmentList
              .sort((a, b) => {
                if (a.isPaid !== b.isPaid) return a.isPaid ? 1 : -1;
                if (a.isOverdue !== b.isOverdue) return a.isOverdue ? -1 : 1;
                return a.daysUntilDue - b.daysUntilDue;
              })
              .map(item => (
              <div key={item.id} className={`bg-white p-5 rounded-[2rem] border ${item.isPaid ? 'border-emerald-200 bg-emerald-50' : 'border-slate-200'} flex items-center justify-between shadow-sm`}>
                <div className="flex items-center gap-4">
                  <div className={`p-3 rounded-2xl ${item.isPaid ? 'bg-emerald-100 text-emerald-600' : 'bg-slate-100 text-slate-500'}`}><CalendarCheck size={20} /></div>
                  <div>
                    <p className="font-bold text-slate-800 leading-tight">{item.name}</p>
                    <div className="flex items-center gap-2 mt-1">
                      <p className="text-[10px] text-slate-500 font-bold uppercase bg-slate-100 px-2 py-0.5 rounded-md">{item.amount} {item.currency}</p>
                      <div className="flex items-center gap-2">
                        {item.isOverdue && !item.isPaid ? (
                          <span className="text-[9px] font-black text-rose-600 uppercase bg-rose-50 px-2 py-0.5 rounded-md">
                            OVERDUE
                          </span>
                        ) : !item.isPaid ? (
                          <span className="text-[9px] font-black text-amber-600 uppercase bg-amber-50 px-2 py-0.5 rounded-md">
                            Due in {item.daysUntilDue} days
                          </span>
                        ) : (
                          <span className="text-[9px] font-black text-emerald-600 uppercase tracking-widest">Paid ✓</span>
                        )}
                      </div>
                    </div>
                  </div>
                </div>
                <div className="flex gap-2">
                  <button onClick={() => { setEditingCommitment(item); setShowCommitmentModal(true); }} className="p-3 text-indigo-400 hover:text-indigo-600 transition-colors bg-slate-50 hover:bg-indigo-50 rounded-xl"><Edit3 size={16} /></button>
                  <button onClick={() => setConfirmDelete({ col: 'commitments', id: item.id, title: 'Bill' })} className="p-3 text-slate-300 hover:text-rose-500 transition-colors bg-slate-50 hover:bg-rose-50 rounded-xl"><Trash2 size={16} /></button>
                </div>
              </div>
            ))}
            {stats.commitmentList.length === 0 && (
              <div className="text-center py-16 bg-white rounded-[2rem] border border-slate-200">
                <CalendarCheck className="mx-auto text-slate-200 mb-4" size={48} />
                <p className="text-lg font-black text-slate-300 mb-2">No Bills Tracked</p>
                <p className="text-xs text-slate-400 font-medium mb-6 px-8">Add your recurring bills like rent, insurance, subscriptions to never miss a payment.</p>
                <button onClick={() => setShowCommitmentModal(true)} className="bg-slate-900 text-white px-6 py-3 rounded-xl text-xs font-black uppercase tracking-widest">
                  + Add First Bill
                </button>
              </div>
            )}
          </div>
        </div>
      );
    }

    function WealthTab({ stats, formatMoney, setConfirmDelete, setShowDebtModal }) {
      return (
        <div className="space-y-6 pb-20 animate-in fade-in slide-in-from-bottom-4">
          <div className="flex justify-between items-center px-1">
            <h2 className="text-xl font-black">Holdings & Liabilities</h2>
            <button onClick={() => setShowDebtModal(true)} className="px-4 py-2 bg-slate-900 text-white rounded-xl text-xs font-black uppercase tracking-widest shadow-lg flex items-center gap-2"><Plus size={16} /> Add A/c</button>
          </div>
          
          <div className="bg-gradient-to-br from-emerald-600 to-teal-700 rounded-[2.5rem] p-8 text-white shadow-xl shadow-emerald-100 relative overflow-hidden">
            <div className="absolute top-0 right-0 w-32 h-32 bg-white/10 rounded-full -mr-10 -mt-10 blur-2xl"></div>
            <p className="text-[10px] font-bold text-emerald-100 uppercase tracking-widest relative z-10">Consolidated Wealth</p>
            <h3 className="text-4xl font-black mt-1 relative z-10">{formatMoney(stats.totalWealthSAR)}</h3>
          </div>

          <div className="space-y-3">
            <h3 className="text-[10px] font-black uppercase text-slate-400 tracking-widest px-1">Bank Accounts / Assets</h3>
            {stats.realtimeDebts.filter(d => d.type === 'asset').map(asset => (
              <div key={asset.id} className="bg-white p-5 rounded-[2rem] border border-slate-200 shadow-sm flex items-center justify-between">
                <div className="flex items-center gap-4">
                  <div className="p-3 bg-indigo-50 rounded-2xl text-indigo-600"><Landmark size={20} /></div>
                  <div>
                    <p className="font-bold text-slate-800 leading-tight">{asset.name}</p>
                    <div className="flex items-center gap-2 mt-1">
                      <p className="text-sm font-black text-slate-900">{formatMoney(asset.realtimeBalanceSAR)}</p>
                      {asset.currency !== 'SAR' && (
                        <p className="text-[10px] font-bold text-slate-400 bg-slate-50 px-2 py-0.5 rounded-lg border border-slate-100">
                          {asset.realtimeBalanceOriginal.toLocaleString(undefined, { maximumFractionDigits: 0 })} {asset.currency}
                        </p>
                      )}
                    </div>
                  </div>
                </div>
                <div className="flex gap-2">
                  <button onClick={() => { setEditingDebt(asset); setDebtModalType('asset'); setShowDebtModal(true); }} className="p-3 text-indigo-400 hover:text-indigo-600 transition-colors bg-slate-50 hover:bg-indigo-50 rounded-xl shadow-sm"><Edit3 size={16} /></button>
                  <button onClick={() => setConfirmDelete({ col: 'debts', id: asset.id, title: 'Account' })} className="p-3 text-slate-300 hover:text-rose-500 bg-slate-50 rounded-xl transition-all shadow-sm"><Trash2 size={16} /></button>
                </div>
              </div>
            ))}
          </div>

          <div className="space-y-4 pt-4">
            <h3 className="text-[10px] font-black uppercase text-purple-500 tracking-widest px-1">Credit Cards</h3>
            {stats.realtimeDebts.filter(d => d.type === 'credit_card').map(card => {
              const usagePercent = card.usagePercent || 0;
              return (
                <div key={card.id} className="bg-gradient-to-br from-slate-800 to-slate-900 p-6 rounded-[2.5rem] text-white shadow-xl relative overflow-hidden group">
                  <div className="absolute top-0 right-0 w-32 h-32 bg-white/5 rounded-full -mr-10 -mt-10 blur-2xl"></div>
                  <div className="flex justify-between items-start mb-6 relative z-10">
                    <div>
                      <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">{card.name}</p>
                      <p className="text-2xl font-black mt-1 leading-none">{formatMoney(card.realtimeBalanceSAR)}</p>
                      <p className="text-[10px] text-slate-500 mt-2 font-bold uppercase">of {formatMoney(card.creditLimit, card.currency)} limit</p>
                    </div>
                    <div className="text-right flex flex-col items-end">
                      <p className="text-[10px] text-slate-400 uppercase font-bold tracking-widest">Available</p>
                      <p className="text-lg font-black text-emerald-400 mt-1 leading-none">{formatMoney(card.availableCreditSAR)}</p>
                      <div className="flex gap-2 mt-4">
                        <button onClick={() => { setEditingDebt(card); setDebtModalType('credit_card'); setShowDebtModal(true); }} className="p-2 bg-white/10 hover:bg-indigo-500/20 hover:text-indigo-300 rounded-lg transition-all"><Edit3 size={14} /></button>
                        <button onClick={() => setConfirmDelete({ col: 'debts', id: card.id, title: 'Card' })} className="p-2 bg-white/10 hover:bg-rose-500/20 hover:text-rose-400 rounded-lg transition-all"><Trash2 size={14} /></button>
                      </div>
                    </div>
                  </div>
                  <div className="w-full bg-white/10 rounded-full h-2 mb-4 relative z-10">
                    <div className={`h-2 rounded-full transition-all duration-1000 ${usagePercent > 80 ? 'bg-rose-500' : usagePercent > 50 ? 'bg-amber-500' : 'bg-emerald-500'}`} 
                         style={{ width: `${Math.min(usagePercent, 100)}%` }}></div>
                  </div>
                  <div className="flex justify-between text-[9px] text-slate-400 font-black uppercase tracking-widest relative z-10">
                    <span>{usagePercent.toFixed(0)}% Used</span>
                    <span>Due Day: {card.paymentDueDate}th</span>
                  </div>
                </div>
              );
            })}
          </div>

          <div className="space-y-3 pt-4">
            <h3 className="text-[10px] font-black uppercase text-rose-400 tracking-widest px-1">Active Loans</h3>
            {stats.realtimeDebts.filter(d => d.type === 'debt').map(debt => (
              <div key={debt.id} className="bg-white p-5 rounded-[2rem] border border-rose-100 shadow-sm flex items-center justify-between">
                <div className="flex items-center gap-4">
                  <div className="p-3 bg-rose-50 rounded-2xl text-rose-600"><Banknote size={20} /></div>
                  <div>
                    <p className="font-bold text-slate-800 leading-tight">{debt.name}</p>
                    <div className="flex items-center gap-2 mt-1">
                      <p className="text-sm font-black text-rose-600">{formatMoney(debt.realtimeBalanceSAR)}</p>
                      {debt.currency !== 'SAR' && (
                        <p className="text-[10px] font-bold text-slate-400 bg-slate-50 px-2 py-0.5 rounded-lg border border-slate-100">
                          {debt.realtimeBalanceOriginal.toLocaleString(undefined, { maximumFractionDigits: 0 })} {debt.currency}
                        </p>
                      )}
                    </div>
                  </div>
                </div>
                <div className="flex gap-2">
                   <button onClick={() => { setEditingDebt(debt); setDebtModalType('debt'); setShowDebtModal(true); }} className="p-3 text-indigo-400 hover:text-indigo-600 transition-colors bg-slate-50 hover:bg-indigo-50 rounded-xl shadow-sm"><Edit3 size={16} /></button>
                   <button onClick={() => setConfirmDelete({ col: 'debts', id: debt.id, title: 'Loan' })} className="p-3 text-slate-300 hover:text-rose-500 bg-slate-50 rounded-xl transition-all shadow-sm"><Trash2 size={16} /></button>
                </div>
              </div>
            ))}
          </div>

          {stats.realtimeDebts.length === 0 && (
            <div className="text-center py-16 bg-white rounded-[2rem] border border-slate-200">
              <Landmark className="mx-auto text-slate-200 mb-4" size={48} />
              <p className="text-lg font-black text-slate-300 mb-2">No Accounts Yet</p>
              <p className="text-xs text-slate-400 font-medium mb-6 px-8">Link your bank accounts, credit cards, and loans to track your complete financial picture.</p>
              <button onClick={() => setShowDebtModal(true)} className="bg-slate-900 text-white px-6 py-3 rounded-xl text-xs font-black uppercase tracking-widest">
                + Add First Account
              </button>
            </div>
          )}
        </div>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>

</html>
