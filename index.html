<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Lavender — Structured Finance Portfolio</title>

  <!-- External SEO & UI Meta -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#f8fafc">

  <!-- Core Component Styles -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/styles.css">

  <!-- Premium Typography -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">

  <!-- Icon System (UMD) -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- IMPORTANT: Import Map for Modular SDKs without Build Tools -->
  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "htm": "https://esm.sh/htm@3.1.1",
        "firebase/app": "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js"
      }
    }
  </script>
</head>

<body class="bg-slate-50">
  <!-- React Mount Point -->
  <div id="root">
    <!-- Static Initial Loader -->
    <div class="h-screen w-full flex flex-col items-center justify-center bg-slate-900 text-white">
      <div id="loader-spinner" class="w-16 h-16 border-4 border-purple-500/20 border-t-purple-500 rounded-full animate-spin"></div>
      <p id="loader-text" class="mt-8 text-[10px] font-black uppercase tracking-[0.3em] text-slate-500">Connecting Portfolio</p>
      
      <!-- Fallback message for local testing -->
      <div id="local-warning" class="hidden mt-4 px-6 text-center">
        <p class="text-xs text-rose-400 font-bold">⚠️ Portals Blocked</p>
        <p class="text-[10px] text-slate-500 mt-2 max-w-[250px]">Browsers block modular files when opened directly from folders. Please upload to cPanel or use 'Live Server' to view.</p>
      </div>
    </div>
  </div>

  <script>
    // Detect if running on file:// and show warning
    if (window.location.protocol === 'file:') {
      setTimeout(() => {
        document.getElementById('loader-spinner').classList.add('border-rose-500/20', 'border-t-rose-500');
        document.getElementById('loader-text').innerText = 'Local Access Restricted';
        document.getElementById('local-warning').classList.remove('hidden');
      }, 3000);
    }
  </script>

  <!-- Modular Application Entry -->
  <script type="module" src="js/app.js"></script>
</body>

</html>
